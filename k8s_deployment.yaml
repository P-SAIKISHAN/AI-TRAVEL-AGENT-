apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-travel-agent
  labels:
    app: ai-travel-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-travel-agent

  template:
    metadata:
      labels:
        app: ai-travel-agent

    spec:
      containers:
        - name: flask-container
          image: flask-app:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: DEBUG
              value: "False"

            - name: PORT
              value: "5000"

          envFrom:
            - secretRef:
                name: llmops-secrets

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service

metadata:
  name: ai-travel-agent-service

spec:
  type: NodePort

  selector:
    app: ai-travel-agent

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
