apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-travel-agent
  labels:
    app: ai-travel-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-travel-agent
  template:
    metadata:
      labels:
        app: ai-travel-agent
    spec:
      containers:
      - name: flask-app
        image: ai-travel-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: FLASK_ENV
          value: "production"
        - name: DEBUG
          value: "False"
        - name: PORT
          value: "5000"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-travel-agent-service
  labels:
    app: ai-travel-agent
spec:
  type: LoadBalancer
  selector:
    app: ai-travel-agent
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    name: http